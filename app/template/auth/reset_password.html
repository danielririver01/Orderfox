<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Nueva Contraseña</title>
    <link rel="icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%2048%2048'%3E%3Cpath%20d%3D'M24%2042L8%2022L16%2010L20%2016H28L32%2010L40%2022L24%2042Z'%20fill%3D'%23f97316'%2F%3E%3Cpath%20d%3D'M24%2042L18%2030L24%2035L30%2030L24%2042Z'%20fill%3D'%23fff'%2F%3E%3Cpath%20d%3D'M24%2038L23%2039.5L24%2041L25%2039.5L24%2038Z'%20fill%3D'%231c1917'%2F%3E%3C/svg%3E" type="image/svg+xml">
    
    <!-- Fonts & Config -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="{{ url_for('static', filename='JS/tailwind.login.js') }}"></script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display antialiased min-h-screen flex flex-col items-center justify-center p-4">
    <main class="w-full max-w-[420px] mx-auto">
        <div class="w-full bg-white dark:bg-[#2c1a15] rounded-xl shadow-lg border border-gray-100 dark:border-[#3e251e] overflow-hidden">
            <div class="px-8 pt-10 pb-8 flex flex-col items-center">
                
                <!-- Icon -->
                <div class="mb-6 flex items-center justify-center h-16 w-16 rounded-full bg-primary/10 dark:bg-primary/20">
                    <span class="material-symbols-outlined text-primary text-[32px]">key</span>
                </div>
                
                <!-- Header -->
                <div class="text-center mb-8">
                    <h1 class="text-[#1c110d] dark:text-white text-2xl font-bold tracking-tight mb-2">
                        Nueva Contraseña
                    </h1>
                    <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">
                        Crea una contraseña segura para tu cuenta.
                    </p>
                </div>

                <!-- Flash Messages -->
                {% include 'components/flash_messages.html' %}

                <form class="w-full flex flex-col gap-5" method="POST" data-ajax="true">
                    
                    <!-- Password Field -->
                    <div class="flex flex-col gap-2">
                        <label class="text-[#1c110d] dark:text-gray-200 text-xs font-bold uppercase tracking-widest leading-normal" for="password">
                            Nueva contraseña
                        </label>
                        <input type="password" name="password" id="password" required 
                               class="w-full rounded-lg border border-[#e8d5ce] dark:border-[#4a2e26] bg-[#fcf9f8] dark:bg-[#221410] text-[#1c110d] dark:text-white px-4 py-3 text-base focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-gray-400" 
                               placeholder="••••••••">
                    </div>

                    <!-- Confirm Field -->
                    <div class="flex flex-col gap-2">
                        <input type="password" name="confirm_password" id="confirm_password" required 
                               class="w-full rounded-lg border border-[#e8d5ce] dark:border-[#4a2e26] bg-[#fcf9f8] dark:bg-[#221410] text-[#1c110d] dark:text-white px-4 py-3 text-base focus:ring-2 focus:ring-primary/20 transition-all placeholder:text-gray-400" 
                               placeholder="Repetir contraseña">
                    </div>

                    <!-- Validation Checklist -->
                    <div class="bg-gray-50 dark:bg-[#221410] p-4 rounded-lg space-y-2">
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Requisitos de Seguridad</p>
                        <div id="check-upper" class="flex items-center gap-2 text-xs text-gray-400 transition-colors">
                            <span class="material-symbols-outlined text-[16px]">circle</span>
                            <span>Al menos una mayúscula</span>
                        </div>
                        <div id="check-number" class="flex items-center gap-2 text-xs text-gray-400 transition-colors">
                            <span class="material-symbols-outlined text-[16px]">circle</span>
                            <span>Incluir números (mín. 8 caracteres)</span>
                        </div>
                        <div id="check-match" class="flex items-center gap-2 text-xs text-gray-400 transition-colors">
                            <span class="material-symbols-outlined text-[16px]">circle</span>
                            <span>Las contraseñas coinciden</span>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button id="submitBtn" disabled type="submit" 
                            class="mt-2 w-full flex items-center justify-center gap-2 bg-primary hover:bg-[#d63a0a] disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-bold h-12 rounded-lg transition-all duration-200 shadow-sm active:scale-[0.99]">
                        <span>Actualizar Contraseña</span>
                        <span class="material-symbols-outlined text-[20px]">check_circle</span>
                    </button>
                </form>
            </div>
        </div>
    </main>
    <script src="{{ url_for('static', filename='JS/auth-common.js') }}"></script>
    <script src="{{ url_for('static', filename='JS/auth/reset_password.js') }}"></script>
    <script src="{{ url_for('static', filename='JS/auth/ajax_form.js') }}"></script>
</body>
</html>
