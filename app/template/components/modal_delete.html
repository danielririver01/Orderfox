<!-- Modal de Confirmación de Eliminación Refinado -->
<div id="deleteModal" class="fixed inset-0 z-[100] hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <!-- Overlay: Fondo oscuro profundo con opacidad controlada -->
    <div class="fixed inset-0 bg-slate-900/60 transition-opacity" aria-hidden="true" onclick="closeDeleteModal()"></div>

    <!-- Contenido del Modal: Aseguramos que esté SOBRE el overlay con relative y z-index -->
    <div class="fixed inset-0 z-10 overflow-y-auto">
        <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-3xl bg-white text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-md border border-gray-100">
                
                <div class="bg-white px-6 pt-8 pb-6 sm:px-10 sm:pt-10">
                    <div class="sm:flex sm:items-start">
                        <!-- Icono: Más vibrante y con mejor contraste -->
                        <div class="mx-auto flex h-14 w-14 flex-shrink-0 items-center justify-center rounded-2xl bg-red-50 sm:mx-0 sm:h-12 sm:w-12">
                            <svg class="h-8 w-8 text-red-600" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
                            </svg>
                        </div>
                        
                        <div class="mt-4 text-center sm:mt-0 sm:ml-6 sm:text-left">
                            <h3 class="text-xl font-black text-gray-900 tracking-tight leading-tight" id="modal-title">
                                Confirmar eliminación
                            </h3>
                            <div class="mt-4">
                                <p class="text-base text-gray-600 leading-relaxed font-medium" id="modal-message">
                                    ¿Estás seguro de que deseas eliminar este registro? Esta acción no se puede deshacer.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer del Modal: Más contraste y botones nítidos -->
                <div class="bg-gray-50/50 px-6 py-6 sm:flex sm:flex-row-reverse sm:px-10 gap-3 border-t border-gray-100">
                    <button type="button" id="confirmDeleteBtn" class="inline-flex w-full justify-center rounded-2xl bg-red-600 px-6 py-3 text-sm font-bold text-white shadow-lg shadow-red-200 hover:bg-red-700 transition-all active:scale-95 sm:ml-3 sm:w-auto">
                        Sí, eliminar
                    </button>
                    <button type="button" onclick="closeDeleteModal()" class="mt-3 inline-flex w-full justify-center rounded-2xl bg-white px-6 py-3 text-sm font-bold text-gray-700 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 transition-all active:scale-95 sm:mt-0 sm:w-auto">
                        Cancelar
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
