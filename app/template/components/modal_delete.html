<!-- Modal de Confirmación de Eliminación Refinado -->
<div id="deleteModal" class="fixed inset-0 z-[100] hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <!-- Overlay: Fondo oscuro profundo con opacidad controlada -->
    <div class="fixed inset-0 bg-slate-900/60 dark:bg-black/80 transition-opacity" aria-hidden="true" onclick="closeDeleteModal()"></div>

    <!-- Contenido del Modal -->
    <div class="fixed inset-0 z-10 overflow-y-auto">
        <div class="flex min-h-full items-center justify-center p-4 text-center sm:p-0">
            <div class="relative transform overflow-hidden rounded-3xl bg-white dark:bg-[#141414] text-left shadow-2xl transition-all sm:my-8 sm:w-full sm:max-w-md border border-gray-100 dark:border-[#262626]">
                
                <div class="px-6 pt-8 pb-6 sm:px-10 sm:pt-10">
                    <div class="sm:flex sm:items-start">
                        <!-- Icono -->
                        <div class="mx-auto flex h-14 w-14 flex-shrink-0 items-center justify-center rounded-2xl bg-red-50 dark:bg-red-500/10 sm:mx-0 sm:h-12 sm:w-12">
                            <span class="material-symbols-outlined text-red-600 dark:text-red-500 text-[32px]">warning</span>
                        </div>
                        
                        <div class="mt-4 text-center sm:mt-0 sm:ml-6 sm:text-left">
                            <h3 class="text-xl font-black text-gray-900 dark:text-white tracking-tight leading-tight" id="modal-title">
                                Confirmar eliminación
                            </h3>
                            <div class="mt-4">
                                <p class="text-base text-gray-600 dark:text-gray-400 leading-relaxed font-medium" id="modal-message">
                                    ¿Estás seguro de que deseas eliminar este registro? Esta acción no se puede deshacer.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Footer del Modal -->
                <div class="bg-gray-50/50 dark:bg-[#1a1a1a] px-6 py-6 sm:flex sm:flex-row-reverse sm:px-10 gap-3 border-t border-gray-100 dark:border-[#262626]">
                    <button type="button" id="confirmDeleteBtn" class="inline-flex w-full justify-center rounded-2xl bg-red-600 px-6 py-4 text-xs font-black uppercase tracking-widest text-white shadow-lg shadow-red-500/20 hover:bg-red-700 transition-all active:scale-95 sm:ml-3 sm:w-auto">
                        Sí, eliminar
                    </button>
                    <button type="button" onclick="closeDeleteModal()" class="mt-3 inline-flex w-full justify-center rounded-2xl bg-white dark:bg-[#0a0a0a] px-6 py-4 text-xs font-black uppercase tracking-widest text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-[#262626] shadow-sm hover:bg-gray-50 dark:hover:bg-[#141414] transition-all active:scale-95 sm:mt-0 sm:w-auto">
                        Cancelar
                    </button>
                </div>

            </div>
        </div>
    </div>
</div>
