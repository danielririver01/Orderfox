<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevo Pedido - Velzia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { "primary": "#f2460d", "success": "#16a34a" }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen pb-32">
    
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
        <div class="max-w-md mx-auto px-4 py-4 flex items-center gap-3">
            <a href="{{ url_for('orders.index') }}" class="text-gray-600 hover:text-gray-900">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </a>
            <h1 class="text-xl font-bold text-gray-900">Nuevo Pedido</h1>
        </div>
    </header>

    <div class="max-w-md mx-auto px-4 py-6">
        <form id="order-form" method="POST" action="{{ url_for('orders.create') }}" class="space-y-6">
            <!-- Datos del Cliente -->
            <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6 space-y-4">
                <h2 class="text-sm font-bold text-gray-700 uppercase tracking-wide">Datos del Cliente</h2>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Nombre</label>
                    <input type="text" name="customer_name" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Ej: Juan Pérez">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Teléfono / WhatsApp</label>
                    <input type="tel" name="customer_phone" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" placeholder="300 123 4567">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Notas del pedido</label>
                    <textarea name="notes" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary" placeholder="Ej: Sin cebolla, etc."></textarea>
                </div>
            </div>

            <!-- Selección de Productos -->
            <div class="bg-white rounded-lg border border-gray-200 shadow-sm p-6 space-y-4">
                <h2 class="text-sm font-bold text-gray-700 uppercase tracking-wide">Menú</h2>
                
                <div class="space-y-4">
                    {% for product in products %}
                    <div class="flex items-center justify-between py-2 border-b border-gray-100 last:border-0">
                        <div class="flex-1">
                            <h3 class="font-medium text-gray-900">{{ product.name }}</h3>
                            <p class="text-xs text-gray-500">${{ '{:,}'.format(product.price) }}</p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button type="button" onclick="updateQty('{{ product.id }}', -1)" class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 hover:bg-gray-100">-</button>
                            <span id="qty-{{ product.id }}" class="w-4 text-center font-bold">0</span>
                            <button type="button" onclick="updateQty('{{ product.id }}', 1)" class="w-8 h-8 rounded-full border border-gray-300 flex items-center justify-center text-gray-500 hover:bg-gray-100">+</button>
                            <input type="hidden" class="product-qty-input" data-id="{{ product.id }}" data-price="{{ product.price }}" value="0">
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <!-- Campo oculto para los items en JSON -->
            <input type="hidden" name="items" id="items-json">

            <!-- Footer con Total y Botón -->
            <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
                <div class="max-w-md mx-auto flex items-center justify-between gap-4">
                    <div>
                        <p class="text-xs text-gray-500 uppercase font-bold">Total Pedido</p>
                        <p id="order-total" class="text-2xl font-bold text-primary">$0</p>
                    </div>
                    <button type="submit" class="flex-1 bg-primary hover:bg-[#d63a0a] text-white font-bold py-3.5 rounded-lg active:scale-95 transition-all">
                        Crear Pedido
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>
        const cart = {};

        function updateQty(productId, delta) {
            const qtySpan = document.getElementById(`qty-${productId}`);
            let currentQty = parseInt(qtySpan.textContent);
            currentQty = Math.max(0, currentQty + delta);
            qtySpan.textContent = currentQty;
            
            if (currentQty > 0) {
                cart[productId] = currentQty;
            } else {
                delete cart[productId];
            }
            
            calculateTotal();
        }

        function calculateTotal() {
            let total = 0;
            const inputs = document.querySelectorAll('.product-qty-input');
            const items = [];

            inputs.forEach(input => {
                const id = input.dataset.id;
                const price = parseInt(input.dataset.price);
                const qty = parseInt(document.getElementById(`qty-${id}`).textContent);
                
                if (qty > 0) {
                    total += price * qty;
                    items.push({
                        product_id: parseInt(id),
                        quantity: qty
                    });
                }
            });

            document.getElementById('order-total').textContent = '$' + total.toLocaleString();
            document.getElementById('items-json').value = JSON.stringify(items);
        }

        document.getElementById('order-form').onsubmit = function(e) {
            const items = JSON.parse(document.getElementById('items-json').value || '[]');
            if (items.length === 0) {
                e.preventDefault();
                alert('Por favor selecciona al menos un producto');
            }
        };
    </script>
</body>
</html>
