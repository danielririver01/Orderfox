<!DOCTYPE html>
<html lang="es" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Velzia</title>
    <!-- Preconnect for Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Tailwind CSS (CDN for dev, should be local for prod for max speed) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#f2460d",
                        "success": "#16a34a",
                        "text-main": "#1c110d",
                        "text-muted": "#6b7280",
                        "bg-light": "#f8f6f5",
                    },
                    fontFamily: {
                        sans: ['system-ui', 'sans-serif'], // System fonts for max speed
                    }
                },
            },
        }
    </script>
    <style>
        /* Minimal custom CSS for things Tailwind handles poorly or for critical rendering */
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-bg-light text-text-main antialiased min-h-screen p-4 pb-20 max-w-md mx-auto relative">

    <!-- Header & Toggle Tienda -->
    <header class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <span class="text-xl font-bold tracking-tight text-primary">Velzia</span>
        </div>

        <!-- Botón Salir (Centrado/Derecha para usar el espacio) -->
         <a href="{{ url_for('auth.logout') }}" class="text-xs font-semibold text-red-500 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-full border border-red-100 transition-colors">
            Salir
        </a>
        
        <!-- Toggle Tienda (Checkbox Hack) -->
        <label class="inline-flex items-center cursor-pointer select-none">
            <input type="checkbox" checked class="sr-only peer">
            <span class="mr-3 text-sm font-semibold text-text-main peer-checked:text-success">
                <span class="peer-checked:hidden">Cerrado</span>
                <span class="hidden peer-checked:inline">Abierto</span>
            </span>
            <div class="relative w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-success"></div>
        </label>
    </header>

    <!-- Sección 1: Estado Crítico -->
    <section class="mb-6" aria-label="Métricas del día">
        <h2 class="sr-only">Estado del Negocio</h2>
        <div class="grid grid-cols-2 gap-3 mb-3">
            <!-- Pendientes -->
            <div class="bg-white p-4 rounded-lg border border-orange-100 shadow-sm flex flex-col justify-between">
                <span class="text-xs font-bold uppercase text-orange-600 tracking-wider">Pendientes</span>
                <span class="text-3xl font-bold mt-1 text-text-main">3</span>
            </div>
            <!-- En Cocina -->
            <div class="bg-white p-4 rounded-lg border border-blue-100 shadow-sm flex flex-col justify-between">
                <span class="text-xs font-bold uppercase text-blue-600 tracking-wider">Cocina</span>
                <span class="text-3xl font-bold mt-1 text-text-main">5</span>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-3">
             <!-- Entregados -->
             <div class="bg-white p-4 rounded-lg border border-green-100 shadow-sm flex flex-col justify-between">
                <span class="text-xs font-bold uppercase text-green-600 tracking-wider">Entregados</span>
                <span class="text-3xl font-bold mt-1 text-text-main">12</span>
            </div>
            <!-- Ventas Totales -->
             <div class="bg-white p-4 rounded-lg border border-gray-100 shadow-sm flex flex-col justify-between">
                <span class="text-xs font-bold uppercase text-gray-500 tracking-wider">Ventas Hoy</span>
                <span class="text-xl font-bold mt-2 text-text-main">$450.000</span>
            </div>
        </div>
    </section>

    <!-- Sección 2: Identidad Digital -->
    <section class="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-6" aria-label="Menú Digital">
        <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-lg text-text-main">Tu Menú Digital</h3>
            <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-green-100 text-green-700 border border-green-200 uppercase tracking-wide">Activo</span>
        </div>
        
        <button class="w-full bg-primary hover:bg-[#d63a0a] text-white font-bold py-3.5 px-4 rounded-lg shadow-sm active:scale-[0.98] transition-all flex items-center justify-center gap-2 mb-3" onclick="navigator.clipboard.writeText('velzia.app/menu/el-costeno'); alert('¡Link copiado!')">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path d="M15 8a3 3 0 10-2.977-2.63l-4.94 2.47a3 3 0 100 4.319l4.94 2.47a3 3 0 10.895-1.789l-4.94-2.47a3.027 3.027 0 000-.74l4.94-2.47C13.456 7.68 14.19 8 15 8z" />
            </svg>
            Compartir Menú
        </button>
        
        <div class="text-center">
             <span class="text-xs text-text-muted">Link: velzia.app/menu/el-costeno</span>
        </div>
    </section>

    <!-- Sección 3: Acciones Rápidas -->
    <section aria-label="Acciones Rápidas">
        <div class="grid grid-cols-2 gap-3">
            <a href="{{ url_for('products.create') }}" class="bg-white hover:bg-gray-50 border border-gray-200 text-text-main font-medium py-3 rounded-lg shadow-sm active:bg-gray-100 flex flex-col items-center justify-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                <span class="text-sm">Añadir Producto</span>
            </a>
            <button class="bg-white hover:bg-gray-50 border border-gray-200 text-text-main font-medium py-3 rounded-lg shadow-sm active:bg-gray-100 flex flex-col items-center justify-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span class="text-sm">Editar Precios</span>
            </button>
        </div>
    </section>
    
    <!-- Footer -->
    <footer class="mt-8 text-center mb-4">
        <p class="text-[10px] text-text-muted">Velzia Lite v1.0 • Riosucio, Caldas</p>
    </footer>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 z-[100] pb-[env(safe-area-inset-bottom)] shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto">
            <a href="#" class="flex flex-col items-center justify-center w-full h-full text-primary">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                </svg>
                <span class="text-[10px] font-medium mt-0.5">Inicio</span>
            </a>
            <a href="{{ url_for('products.index') }}" class="flex flex-col items-center justify-center w-full h-full text-text-muted hover:text-primary transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                <span class="text-[10px] font-medium mt-0.5">Productos</span>
            </a>
            <a href="{{ url_for('orders.index') }}" class="flex flex-col items-center justify-center w-full h-full text-text-muted hover:text-primary transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                </svg>
                <span class="text-[10px] font-medium mt-0.5">Pedidos</span>
            </a>
            <a href="{{ url_for('categories.index') }}" class="flex flex-col items-center justify-center w-full h-full text-text-muted hover:text-primary transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                </svg>
                <span class="text-[10px] font-medium mt-0.5">Categorías</span>
            </a>
            <a href="#" class="flex flex-col items-center justify-center w-full h-full text-text-muted hover:text-primary transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
                <span class="text-[10px] font-medium mt-0.5">Tienda</span>
            </a>
        </div>
    </nav>

</body>
</html>
