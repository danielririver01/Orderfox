{% extends "errors/layout.html" %}

{% block title %}Acceso Denegado{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="flex justify-center mb-6">
        <div class="w-24 h-24 bg-yellow-100 dark:bg-yellow-500/20 rounded-full flex items-center justify-center text-yellow-600 transition-colors duration-300">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
        </div>
    </div>
    
    <h1 class="text-6xl font-bold text-gray-900 dark:text-white tracking-tight transition-colors duration-300">403</h1>
    <h2 class="text-2xl font-semibold text-gray-800 dark:text-gray-200 transition-colors duration-300">Acceso Denegado</h2>
    
    <p class="text-gray-600 dark:text-gray-400 leading-relaxed transition-colors duration-300">
        No tienes permisos suficientes para acceder a esta página.
        Si crees que esto es un error, por favor contacta con soporte.
    </p>

    <div class="flex flex-col sm:flex-row gap-4 justify-center mt-8">
        <a href="{{ url_for('dashboard.index') }}" class="inline-flex items-center justify-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-primary hover:bg-orange-600 transition-colors shadow-sm">
            Volver al Dashboard
        </a>
        <a href="{{ url_for('auth.login') }}" class="inline-flex items-center justify-center px-6 py-3 border border-gray-300 dark:border-[#262626] text-base font-medium rounded-md text-gray-700 dark:text-gray-300 bg-white dark:bg-[#141414] hover:bg-gray-50 dark:hover:bg-[#1a1a1a] transition-colors duration-300 shadow-sm">
            Iniciar Sesión
        </a>
    </div>
</div>
{% endblock %}
