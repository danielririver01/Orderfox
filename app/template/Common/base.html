<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Velzia{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="{{ url_for('static', filename='JS/tailwind.app.js') }}"></script>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <link rel="icon" href="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%2048%2048'%3E%3Cpath%20d%3D'M24%2042L8%2022L16%2010L20%2016H28L32%2010L40%2022L24%2042Z'%20fill%3D'%23f97316'%2F%3E%3Cpath%20d%3D'M24%2042L18%2030L24%2035L30%2030L24%2042Z'%20fill%3D'%23fff'%2F%3E%3Cpath%20d%3D'M24%2038L23%2039.5L24%2041L25%2039.5L24%2038Z'%20fill%3D'%231c1917'%2F%3E%3C/svg%3E" type="image/svg+xml">
    <!-- Preconnect for Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/dashboard.css') }}">
</head>
<body>
    {% if sub_status and sub_status.status == 'grace_period' %}
    <div class="bg-amber-50 border-b border-amber-200 py-2 px-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-3">
            <div class="flex items-center gap-2 text-amber-800 text-sm font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-600" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                </svg>
                <span>Tu membresía ha vencido. Te quedan <strong>{{ sub_status.days_grace_remaining }} días</strong> antes de la desactivación de tu cuenta e información.</span>
            </div>
            <a href="{{ url_for('dashboard.subscription') }}" class="text-xs bg-amber-600 text-white px-3 py-1.5 rounded-lg hover:bg-amber-700 transition-colors font-semibold whitespace-nowrap">
                Renovar Ahora
            </a>
        </div>
    </div>
    <div class="pointer-events-none fixed inset-0 z-40 bg-white/5 backdrop-blur-[0.5px]"></div>
    {% endif %}

    {% block content %}{% endblock %}

    <!-- Modales Globales -->
    {% include 'components/modal_delete.html' %}
    
    <!-- Scripts Globales -->
    <script src="{{ url_for('static', filename='js/auth-common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modal-delete.js') }}"></script>
</body>

</html>
