<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servicio Temporalmente Suspendido - {{ restaurant.name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full bg-white rounded-3xl shadow-xl overflow-hidden glass-effect text-center p-8 border border-gray-100">
        <div class="mb-6 inline-flex items-center justify-center w-20 h-20 bg-orange-100 rounded-full text-orange-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
        </div>
        
        <h1 class="text-2xl font-bold text-gray-900 mb-2">{{ restaurant.name }}</h1>
        <p class="text-gray-500 mb-8 leading-relaxed">
            Este menú digital se encuentra temporalmente suspendido por razones técnicas o de mantenimiento de suscripción. 
        </p>

        <div class="bg-gray-50 rounded-2xl p-4 mb-8">
            <p class="text-sm text-gray-600 font-medium">¿Eres el dueño del negocio?</p>
            <p class="text-xs text-gray-500 mt-1">Ingresa a tu panel de control para reactivar tu servicio en segundos.</p>
        </div>

        <a href="{{ url_for('auth.login') }}" class="inline-flex items-center justify-center w-full py-4 px-6 rounded-2xl bg-orange-600 hover:bg-orange-700 text-white font-bold transition-all shadow-lg active:scale-95">
            Acceder al Panel
        </a>
        
        <p class="mt-8 text-xs text-gray-400">
            Powered by <span class="font-bold">Velzia</span>
        </p>
    </div>
</body>
</html>
